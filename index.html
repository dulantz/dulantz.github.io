<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>成员展示站</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <style>
    body {
      font-family: "Microsoft YaHei", sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #0b1023, #172341);
      color: #f6f7fb;
    }
    .page {
      max-width: 1080px;
      margin: 0 auto;
    }
    .hero {
      background: rgba(255, 255, 255, 0.08);
      padding: 20px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .hero p {
      line-height: 1.7;
      color: #dce7ff;
      margin: 0;
    }
    .btn {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      background: linear-gradient(135deg, #5ec8ff, #7d95ff);
      color: #05111d;
      font-weight: 700;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 18px;
    }
    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 16px;
      cursor: pointer;
    }
    .card:hover {
      background: rgba(255, 255, 255, 0.14);
    }
    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .name {
      font-size: 20px;
      margin: 0 0 4px;
    }
    .role {
      color: #9ecbff;
      margin: 0 0 8px;
    }
    .bio {
      color: #e7efff;
      line-height: 1.7;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 18, 0.82);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 100;
    }
    .overlay.show {
      display: flex;
    }
    .modal {
      width: min(700px, 100%);
      background: #10172c;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 18px;
    }
    .close {
      float: right;
      border: none;
      background: transparent;
      color: white;
      font-size: 24px;
      cursor: pointer;
    }
    .field {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      margin-top: 8px;
    }
    .field::placeholder {
      color: #9fb8ff;
    }
    .comment-list {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }
    .comment-item {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.06);
    }
    .small {
      color: #8fb3ff;
      font-size: 13px;
      margin-top: 8px;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .create-bar {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }
    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .hero {
        flex-direction: column;
        align-items: flex-start;
      }
      .create-bar {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div>
        <h1>2-106</h1>
        <p>支持所有。</p>
      </div>
      <div class="actions">
        <button class="btn" id="manageBtn">管理</button>
      </div>
    </div>

    <div class="create-bar">
      <button class="btn" id="createBtn">创建</button>
    </div>

    <div class="grid" id="memberGrid"></div>
  </div>

  <div class="overlay" id="profileOverlay">
    <div class="modal">
      <button class="close" id="closeBtn" aria-label="关闭">×</button>
      <h2 id="modalTitle">成员详情</h2>
      <p id="modalRole"></p>
      <p id="modalBio"></p>
      <div style="margin-top: 12px;">
        <input class="field" id="commentAuthor" placeholder="你的名字" />
        <textarea class="field" id="commentText" rows="4" placeholder="写下你的评论"></textarea>
        <button class="btn" id="sendCommentBtn" style="margin-top: 8px;">发送评论</button>
        <div class="comment-list" id="commentList"></div>
      </div>
    </div>
  </div>

  <div class="overlay" id="createOverlay">
    <div class="modal">
      <button class="close" id="closeCreateBtn" aria-label="关闭">×</button>
      <h2>创建成员</h2>
      <input class="field" id="createName" placeholder="姓名" />
      <input class="field" id="createRole" placeholder="职位" />
      <input class="field" id="createAvatarUrl" placeholder="头像地址，例如 images/team1234.png" />
      <input class="field" id="createAvatarFile" type="file" accept="image/png,image/jpeg,image/jpg" />
      <textarea class="field" id="createBio" rows="4" placeholder="简介"></textarea>
      <button class="btn" id="saveCreateBtn" style="margin-top: 8px;">保存成员</button>
    </div>
  </div>

  <script>
    // ============================================================
    //  Supabase 配置（已添加）
    // ============================================================
    const SUPABASE_URL = 'https://khznzvwyrpylcfhrqjycq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_riAyjeT5yOXWNllLhj3E2w_cnFcSGwa';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ============================================================
    //  状态
    // ============================================================
    let members = [];
    let comments = [];
    let activeMemberId = null;

    // ============================================================
    //  加载数据
    // ============================================================
    async function loadMembers() {
      const { data, error } = await supabase
        .from('members')
        .select('*')
        .order('created_at', { ascending: true });
      if (error) {
        console.error('加载成员失败：', error);
        return [];
      }
      return data || [];
    }

    async function loadComments() {
      const { data, error } = await supabase
        .from('comments')
        .select('*')
        .order('created_at', { ascending: false });
      if (error) {
        console.error('加载评论失败：', error);
        return [];
      }
      return data || [];
    }

    // ============================================================
    //  刷新
    // ============================================================
    async function refreshAll() {
      members = await loadMembers();
      comments = await loadComments();
      renderMembers();
      if (activeMemberId) {
        const m = members.find(x => x.id === activeMemberId);
        if (m) {
          document.getElementById('modalTitle').textContent = m.name;
          document.getElementById('modalRole').textContent = m.role || '成员';
          document.getElementById('modalBio').textContent = m.bio || '暂无简介';
        }
        renderComments();
      }
    }

    // ============================================================
    //  渲染
    // ============================================================
    function renderMembers() {
      const grid = document.getElementById('memberGrid');
      const visible = members.filter(m => !m.hidden);
      grid.innerHTML = '';
      if (!visible.length) {
        grid.innerHTML = '<div class="card"><h2 class="name">暂无可显示成员</h2><p class="bio">点击"创建"添加新成员。</p></div>';
        return;
      }
      visible.forEach(member => {
        const card = document.createElement('div');
        card.className = 'card';
        const avatar = member.avatar_url || 'https://api.dicebear.com/6.x/fun-emoji/svg?seed=' + encodeURIComponent(member
          .name);
        card.innerHTML = `
          <div class="avatar"><img src="${avatar}" alt="头像" onerror="this.src='https://api.dicebear.com/6.x/fun-emoji/svg?seed=default'" /></div>
          <h2 class="name">${member.name}</h2>
          <p class="role">${member.role || '成员'}</p>
          <p class="bio">${member.bio || '暂无简介'}</p>
        `;
        card.addEventListener('click', () => openProfile(member.id));
        grid.appendChild(card);
      });
    }

    function renderComments() {
      const list = document.getElementById('commentList');
      const filtered = comments.filter(c => c.member_id === activeMemberId);
      if (!filtered.length) {
        list.innerHTML = '<div class="comment-item">暂无评论，欢迎留言。</div>';
        return;
      }
      list.innerHTML = '';
      filtered.forEach(c => {
        const node = document.createElement('div');
        node.className = 'comment-item';
        node.innerHTML =
          `<strong>${c.author || '匿名'}</strong><div class="small">${new Date(c.created_at).toLocaleString()}</div><div>${c.content}</div>`;
        list.appendChild(node);
      });
    }

    // ============================================================
    //  打开详情
    // ============================================================
    function openProfile(memberId) {
      const member = members.find(m => m.id === memberId);
      if (!member || member.hidden) return;
      activeMemberId = memberId;
      document.getElementById('modalTitle').textContent = member.name;
      document.getElementById('modalRole').textContent = member.role || '成员';
      document.getElementById('modalBio').textContent = member.bio || '暂无简介';
      renderComments();
      document.getElementById('profileOverlay').classList.add('show');
      document.getElementById('commentAuthor').value = '';
      document.getElementById('commentText').value = '';
    }

    function closeProfile() {
      activeMemberId = null;
      document.getElementById('profileOverlay').classList.remove('show');
    }

    // ============================================================
    //  创建成员
    // ============================================================
    function openCreateOverlay() {
      document.getElementById('createName').value = '';
      document.getElementById('createRole').value = '';
      document.getElementById('createAvatarUrl').value = '';
      document.getElementById('createAvatarFile').value = '';
      document.getElementById('createBio').value = '';
      document.getElementById('createOverlay').classList.add('show');
    }

    function closeCreateOverlay() {
      document.getElementById('createOverlay').classList.remove('show');
    }

    function readImageFile(file) {
      return new Promise((resolve) => {
        if (!file) {
          resolve('');
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result || '');
        reader.readAsDataURL(file);
      });
    }

    async function saveNewMember() {
      const name = document.getElementById('createName').value.trim();
      if (!name) {
        alert('请输入姓名');
        return;
      }
      const file = document.getElementById('createAvatarFile').files[0];
      const avatarUrl = document.getElementById('createAvatarUrl').value.trim();
      const avatar = file ? await readImageFile(file) : avatarUrl;

      const { error } = await supabase
        .from('members')
        .insert([{
          id: 'member-' + Date.now(),
          name: name,
          role: document.getElementById('createRole').value.trim() || null,
          bio: document.getElementById('createBio').value.trim() || null,
          avatar_url: avatar || null,
          hidden: false
        }]);

      if (error) {
        alert('创建失败：' + error.message);
        return;
      }
      closeCreateOverlay();
      refreshAll();
    }

    // ============================================================
    //  评论
    // ============================================================
    async function sendComment() {
      if (!activeMemberId) {
        alert('请先打开一个成员');
        return;
      }
      const author = document.getElementById('commentAuthor').value.trim() || '访客';
      const text = document.getElementById('commentText').value.trim();
      if (!text) {
        alert('请输入评论内容');
        return;
      }
      const { error } = await supabase
        .from('comments')
        .insert([{
          member_id: activeMemberId,
          author: author,
          content: text
        }]);
      if (error) {
        alert('评论失败：' + error.message);
        return;
      }
      document.getElementById('commentText').value = '';
      refreshAll();
    }

    // ============================================================
    //  事件绑定
    // ============================================================
    document.getElementById('createBtn').addEventListener('click', openCreateOverlay);
    document.getElementById('manageBtn').addEventListener('click', () => window.location.href = 'admin.html');
    document.getElementById('closeBtn').addEventListener('click', closeProfile);
    document.getElementById('closeCreateBtn').addEventListener('click', closeCreateOverlay);
    document.getElementById('sendCommentBtn').addEventListener('click', sendComment);
    document.getElementById('saveCreateBtn').addEventListener('click', saveNewMember);

    document.getElementById('profileOverlay').addEventListener('click', (event) => {
      if (event.target === document.getElementById('profileOverlay')) closeProfile();
    });
    document.getElementById('createOverlay').addEventListener('click', (event) => {
      if (event.target === document.getElementById('createOverlay')) closeCreateOverlay();
    });

    // ============================================================
    //  启动
    // ============================================================
    refreshAll();
    console.log('✅ Supabase 已连接');
  </script>
</body>
</html>
