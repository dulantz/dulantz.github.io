<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队成员</title>
    <style>
        /* ===== 全局 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 50px 20px;
        }

        /* ===== 标题 ===== */
        .page-title {
            text-align: center;
            color: #fff;
            font-size: 44px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(100, 100, 255, 0.3);
        }
        .page-sub {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            margin-bottom: 45px;
            letter-spacing: 2px;
        }

        /* ===== 卡片网格 ===== */
        .team-grid {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
        }

        /* ===== 单张卡片 ===== */
        .member-card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 24px;
            padding: 28px 16px 22px;
            text-align: center;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .member-card:hover {
            transform: translateY(-12px) scale(1.02);
            background: rgba(255,255,255,0.14);
            border-color: rgba(255,255,255,0.25);
            box-shadow: 0 20px 60px rgba(80, 80, 255, 0.25);
        }

        .member-card .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            background: #2a2a4a;
            border: 3px solid rgba(255,255,255,0.2);
            transition: border 0.3s;
            margin-bottom: 14px;
        }
        .member-card:hover .avatar {
            border-color: #7c7cff;
        }

        .member-card .name {
            color: #fff;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .member-card .role {
            color: rgba(255,255,255,0.55);
            font-size: 14px;
            letter-spacing: 1px;
        }
        .member-card .badge {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 18px;
            border-radius: 20px;
            background: rgba(124, 124, 255, 0.2);
            color: #b0b0ff;
            font-size: 12px;
            border: 1px solid rgba(124, 124, 255, 0.15);
        }

        /* ===== 弹窗 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: #1e1e3a;
            max-width: 620px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 28px;
            padding: 35px 30px 30px;
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            animation: modalIn 0.35s ease;
            position: relative;
        }
        @keyframes modalIn {
            0% { transform: scale(0.92) translateY(30px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .modal-close {
            position: sticky;
            top: 0;
            float: right;
            font-size: 32px;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.2s;
            line-height: 1;
            z-index: 10;
        }
        .modal-close:hover {
            color: #fff;
        }

        .modal-avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #7c7cff;
            background: #2a2a4a;
            display: block;
            margin: 0 auto 14px;
        }

        .modal-name {
            text-align: center;
            color: #fff;
            font-size: 30px;
            font-weight: 700;
        }
        .modal-role {
            text-align: center;
            color: #7c7cff;
            font-size: 17px;
            margin-bottom: 18px;
            letter-spacing: 1px;
        }

        .modal-body {
            color: rgba(255,255,255,0.85);
            font-size: 15px;
            line-height: 1.9;
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 20px 22px;
            border-left: 3px solid #7c7cff;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .modal-body strong {
            color: #b0b0ff;
        }

        /* ===== 滚动条美化 ===== */
        .modal-box::-webkit-scrollbar {
            width: 4px;
        }
        .modal-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .modal-box::-webkit-scrollbar-thumb {
            background: #7c7cff;
            border-radius: 10px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            .page-title { font-size: 28px; }
            .team-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
            .member-card { padding: 18px 10px 16px; }
            .member-card .avatar { width: 80px; height: 80px; }
            .member-card .name { font-size: 17px; }
            .modal-box { padding: 24px 16px; }
        }
        @media (max-width: 400px) {
            .team-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
        }
    </style>
</head>
<body>

    <!-- ===== 标题 ===== -->
    <div class="page-title">✨ 核心团队</div>
    <div class="page-sub">点击头像 · 查看完整介绍</div>

    <!-- ===== 卡片容器 ===== -->
    <div class="team-grid" id="teamGrid"></div>

    <!-- ===== 弹窗 ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <button class="modal-close" id="modalClose">✕</button>
            <img class="modal-avatar" id="modalAvatar" src="" alt="头像">
            <div class="modal-name" id="modalName">姓名</div>
            <div class="modal-role" id="modalRole">职位</div>
            <div class="modal-body" id="modalBody">介绍文字</div>
        </div>
    </div>

    <script>
        // ============================================================
        //  ★★★ 数据区：在这里添加 / 修改成员信息 ★★★
        //  格式：每一条用 { } 包起来，中间用逗号分隔
        //  添加新人：复制 { } 里面全部内容，粘贴到上一个 } 后面，加逗号
        // ============================================================
        const members = [
            {
                name: '张艺洁',
                role: '',
                avatar: 'images/team1.jpg',
                bio: '▸ 。'
            },
            {
                name: '孙国零',
                role: '',
                avatar: 'images/team2.jpg',
                bio: '。'
            },
            {
                name: '王瑞天',
                role: '',
                avatar: 'images/team3.jpg',
                bio: '。'
            },
            {
                name: '王浩宇',
                role: 'UI/UX 设计主管',
                avatar: 'images/team4.jpg',
                bio: '▸ 是个丑鸡巴。'
            },
            {
                name: '陈明',
                role: '',
                avatar: 'images/team5.jpg',
                bio: '。'
            }
        ];

        // ============================================================
        //  ★★★ 以下代码不用动，自动生成卡片和弹窗 ★★★
        // ============================================================

        const grid = document.getElementById('teamGrid');
        const overlay = document.getElementById('modalOverlay');
        const closeBtn = document.getElementById('modalClose');
        const mAvatar = document.getElementById('modalAvatar');
        const mName = document.getElementById('modalName');
        const mRole = document.getElementById('modalRole');
        const mBody = document.getElementById('modalBody');

        // 渲染卡片
        members.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'member-card';
            card.innerHTML = `
                <img class="avatar" src="${m.avatar}" alt="${m.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%232a2a4a%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2240%22 font-family=%22sans-serif%22%3E${m.name[0]}%3C/text%3E%3C/svg%3E'">
                <div class="name">${m.name}</div>
                <div class="role">${m.role}</div>
                <div class="badge">点击查看 →</div>
            `;
            card.addEventListener('click', () => openModal(i));
            grid.appendChild(card);
        });

        function openModal(index) {
            const m = members[index];
            if (!m) return;
            mAvatar.src = m.avatar;
            mAvatar.onerror = function() {
                this.src = `data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%232a2a4a%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2240%22 font-family=%22sans-serif%22%3E${m.name[0]}%3C/text%3E%3C/svg%3E`;
            };
            mName.textContent = m.name;
            mRole.textContent = m.role;
            mBody.textContent = m.bio;
            overlay.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            overlay.classList.remove('show');
            document.body.style.overflow = '';
        }

        closeBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>

</body>
</html>
