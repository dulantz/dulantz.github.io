<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>成员展示站</title>
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #0b1023, #172341); color: #f6f7fb; }
    .page { max-width: 1080px; margin: 0 auto; }
    .hero { background: rgba(255,255,255,0.08); padding: 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.12); display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .hero h1 { margin: 0 0 8px; font-size: 28px; }
    .hero p { line-height: 1.7; color: #dce7ff; margin: 0; }
    .btn { border: none; border-radius: 999px; padding: 8px 12px; background: linear-gradient(135deg, #5ec8ff, #7d95ff); color: #05111d; font-weight: 700; cursor: pointer; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; margin-top: 18px; }
    .card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; padding: 16px; cursor: pointer; }
    .card:hover { background: rgba(255,255,255,0.14); }
    .avatar { width: 70px; height: 70px; border-radius: 16px; overflow: hidden; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.12); }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .name { font-size: 20px; margin: 0 0 4px; }
    .role { color: #9ecbff; margin: 0 0 8px; }
    .bio { color: #e7efff; line-height: 1.7; }
    .overlay { position: fixed; inset: 0; background: rgba(2,6,18,0.82); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 100; }
    .overlay.show { display: flex; }
    .modal { width: min(700px, 100%); background: #10172c; border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 18px; }
    .close { float: right; border: none; background: transparent; color: white; font-size: 24px; cursor: pointer; }
    .field { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); color: white; margin-top: 8px; }
    .field::placeholder { color: #9fb8ff; }
    .comment-list { margin-top: 12px; display: grid; gap: 8px; }
    .comment-item { padding: 10px 12px; border-radius: 12px; background: rgba(255,255,255,0.06); }
    .small { color: #8fb3ff; font-size: 13px; margin-top: 8px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .create-bar { display: flex; justify-content: flex-end; margin-top: 14px; }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } .hero { flex-direction: column; align-items: flex-start; } .create-bar { justify-content: flex-start; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div>
        <h1>2-106</h1>
        <p>支持所有。</p>
      </div>
      <div class="actions">
        <button class="btn" id="manageBtn">管理</button>
      </div>
    </div>

    <div class="create-bar">
      <button class="btn" id="createBtn">创建成员</button>
    </div>

    <div class="grid" id="memberGrid"></div>
  </div>

  <div class="overlay" id="profileOverlay">
    <div class="modal">
      <button class="close" id="closeBtn" aria-label="关闭">×</button>
      <h2 id="modalTitle">成员详情</h2>
      <p id="modalRole"></p>
      <p id="modalBio"></p>
      <div style="margin-top: 12px;">
        <input class="field" id="commentAuthor" placeholder="你的名字" />
        <textarea class="field" id="commentText" rows="4" placeholder="写下你的评论"></textarea>
        <button class="btn" id="sendCommentBtn" style="margin-top: 8px;">发送评论</button>
        <div class="comment-list" id="commentList"></div>
      </div>
    </div>
  </div>

  <div class="overlay" id="createOverlay">
    <div class="modal">
      <button class="close" id="closeCreateBtn" aria-label="关闭">×</button>
      <h2>创建成员</h2>
      <input class="field" id="createName" placeholder="姓名" />
      <input class="field" id="createRole" placeholder="职位" />
      <input class="field" id="createAvatarUrl" placeholder="头像地址，例如 images/team1234.png" />
      <input class="field" id="createAvatarFile" type="file" accept="image/png,image/jpeg,image/jpg" />
      <textarea class="field" id="createBio" rows="4" placeholder="简介"></textarea>
      <button class="btn" id="saveCreateBtn" style="margin-top: 8px;">保存成员</button>
    </div>
  </div>

  <script>
    const STORAGE_MEMBERS = 'site_members';
    const STORAGE_COMMENTS = 'site_comments';
    const defaultMembers = [
      { id: 'member-1', name: '小雪', role: 'UI 设计师', bio: '喜欢用颜色和动效讲故事，让内容看起来更有温度。', avatar: 'images/team1234.png', hidden: false },
      { id: 'member-2', name: '可可', role: '前端开发', bio: '负责把想法变成页面，并把交互做得更自然。', avatar: 'images/team5678.jpg', hidden: false }
    ];
    let members = [];
    let comments = [];
    let activeMemberId = null;

    function loadState() {
      try {
        const savedMembers = JSON.parse(localStorage.getItem(STORAGE_MEMBERS));
        const savedComments = JSON.parse(localStorage.getItem(STORAGE_COMMENTS));
        members = Array.isArray(savedMembers) && savedMembers.length ? savedMembers : defaultMembers.slice();
        comments = Array.isArray(savedComments) ? savedComments : [];
      } catch (e) {
        members = defaultMembers.slice();
        comments = [];
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_MEMBERS, JSON.stringify(members));
      localStorage.setItem(STORAGE_COMMENTS, JSON.stringify(comments));
    }

    function renderMembers() {
      const grid = document.getElementById('memberGrid');
      const visibleMembers = members.filter(member => !member.hidden);
      grid.innerHTML = '';
      if (!visibleMembers.length) {
        grid.innerHTML = '<div class="card"><h2 class="name">暂无可显示成员</h2><p class="bio">后台可以先创建成员或取消隐藏。</p></div>';
        return;
      }
      visibleMembers.forEach(member => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="avatar"><img src="${member.avatar || 'https://api.dicebear.com/6.x/fun-emoji/svg?seed=' + encodeURIComponent(member.name)}" alt="头像" /></div>
          <h2 class="name">${member.name}</h2>
          <p class="role">${member.role || '成员'}</p>
          <p class="bio">${member.bio || '暂无简介'}</p>
        `;
        card.addEventListener('click', () => openProfile(member.id));
        grid.appendChild(card);
      });
    }

    function openProfile(memberId) {
      const member = members.find(item => item.id === memberId);
      if (!member || member.hidden) return;
      activeMemberId = memberId;
      document.getElementById('modalTitle').textContent = member.name;
      document.getElementById('modalRole').textContent = member.role || '成员';
      document.getElementById('modalBio').textContent = member.bio || '暂无简介';
      renderComments();
      document.getElementById('profileOverlay').classList.add('show');
      document.getElementById('commentAuthor').value = '';
      document.getElementById('commentText').value = '';
    }

    function closeProfile() {
      activeMemberId = null;
      document.getElementById('profileOverlay').classList.remove('show');
    }

    function renderComments() {
      const list = document.getElementById('commentList');
      const memberComments = comments.filter(item => item.memberId === activeMemberId).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      if (!memberComments.length) {
        list.innerHTML = '<div class="comment-item">暂无评论，欢迎留言。</div>';
        return;
      }
      list.innerHTML = '';
      memberComments.forEach(item => {
        const node = document.createElement('div');
        node.className = 'comment-item';
        node.innerHTML = `<strong>${item.author}</strong><div class="small">${new Date(item.createdAt).toLocaleString()}</div><div>${item.text}</div>`;
        list.appendChild(node);
      });
    }

    function sendComment() {
      if (!activeMemberId) return;
      const author = document.getElementById('commentAuthor').value.trim() || '访客';
      const text = document.getElementById('commentText').value.trim();
      if (!text) {
        alert('请输入评论内容');
        return;
      }
      comments.push({ id: 'comment-' + Date.now(), memberId: activeMemberId, author, text, createdAt: new Date().toISOString() });
      saveState();
      renderComments();
      document.getElementById('commentAuthor').value = '';
      document.getElementById('commentText').value = '';
    }

    function openCreateOverlay() {
      document.getElementById('createName').value = '';
      document.getElementById('createRole').value = '';
      document.getElementById('createAvatarUrl').value = '';
      document.getElementById('createAvatarFile').value = '';
      document.getElementById('createBio').value = '';
      document.getElementById('createOverlay').classList.add('show');
    }

    function closeCreateOverlay() {
      document.getElementById('createOverlay').classList.remove('show');
    }

    function readImageFile(file) {
      return new Promise((resolve) => {
        if (!file) {
          resolve('');
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result || '');
        reader.readAsDataURL(file);
      });
    }

    async function saveNewMember() {
      const name = document.getElementById('createName').value.trim();
      if (!name) {
        alert('请输入姓名');
        return;
      }
      const file = document.getElementById('createAvatarFile').files[0];
      const avatarUrl = document.getElementById('createAvatarUrl').value.trim();
      const avatar = file ? await readImageFile(file) : avatarUrl;
      const newMember = { id: 'member-' + Date.now(), name, role: document.getElementById('createRole').value.trim(), bio: document.getElementById('createBio').value.trim(), avatar: avatar || 'https://api.dicebear.com/6.x/fun-emoji/svg?seed=' + encodeURIComponent(name), hidden: false };
      members.unshift(newMember);
      saveState();
      renderMembers();
      closeCreateOverlay();
    }

    document.getElementById('createBtn').addEventListener('click', openCreateOverlay);
    document.getElementById('manageBtn').addEventListener('click', () => window.location.href = 'admin.html');
    document.getElementById('closeBtn').addEventListener('click', closeProfile);
    document.getElementById('closeCreateBtn').addEventListener('click', closeCreateOverlay);
    document.getElementById('sendCommentBtn').addEventListener('click', sendComment);
    document.getElementById('saveCreateBtn').addEventListener('click', saveNewMember);
    document.getElementById('profileOverlay').addEventListener('click', (event) => {
      if (event.target === document.getElementById('profileOverlay')) closeProfile();
    });
    document.getElementById('createOverlay').addEventListener('click', (event) => {
      if (event.target === document.getElementById('createOverlay')) closeCreateOverlay();
    });

    loadState();
    renderMembers();
  </script>
</body>
</html>
