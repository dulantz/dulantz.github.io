<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>成员展示站</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: "Microsoft YaHei", Arial, sans-serif; background: linear-gradient(135deg, #07101f, #13213b); color: #f5f7fb; }
    .page { max-width: 1040px; margin: 0 auto; padding: 20px 16px 40px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; }
    .title { margin: 0; font-size: 24px; }
    .sub { color: #9ab0d6; font-size: 13px; margin-top: 4px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: none; border-radius: 999px; padding: 8px 12px; background: linear-gradient(135deg, #63d9ff, #7b93ff); color: #04111e; font-weight: 700; cursor: pointer; }
    .btn.secondary { background: rgba(255,255,255,0.12); color: #f5f7fb; }
    .search { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.08); color: white; margin-bottom: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }
    .member-card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 10px; cursor: pointer; transition: transform .2s ease, background .2s ease; }
    .member-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.14); }
    .avatar { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 12px; margin-bottom: 8px; background: #223; }
    .member-card h3 { margin: 4px 0 2px; font-size: 15px; }
    .member-card p { margin: 0; font-size: 12px; color: #a8bad8; }
    .empty { padding: 18px; border-radius: 16px; background: rgba(255,255,255,0.06); color: #a8bad8; }
    .overlay { position: fixed; inset: 0; background: rgba(2,6,18,0.82); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 100; }
    .overlay.show { display: flex; }
    .modal { width: min(620px, 100%); max-height: 86vh; overflow-y: auto; background: #10172d; border-radius: 18px; padding: 18px; box-sizing: border-box; }
    .modal-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 10px; }
    .meta { color: #9ab0d6; font-size: 13px; margin-top: 4px; }
    .textarea, .field { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: white; margin-top: 8px; }
    .comment-list { margin-top: 10px; display: grid; gap: 8px; }
    .comment-item { background: rgba(255,255,255,0.06); padding: 10px; border-radius: 12px; }
    .comment-author { font-weight: 700; font-size: 13px; }
    .comment-time { color: #8dacff; font-size: 11px; margin-top: 3px; }
    .actions-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    @media (max-width: 760px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1 class="title">成员展示站</h1>
        <div class="sub">点击成员卡片查看详情，也可以直接留言</div>
      </div>
      <div class="actions">
        <a class="btn secondary" href="admin.html" style="text-decoration: none; display: inline-block;">后台管理</a>
        <button class="btn" id="createBtn">创建成员</button>
      </div>
    </div>
    <input class="search" id="memberSearch" placeholder="搜索成员姓名、职位或简介" />
    <div class="grid" id="membersGrid"></div>
  </div>

  <div class="overlay" id="profileOverlay">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h2 id="profileName" style="margin: 0;"></h2>
          <div class="meta" id="profileRole"></div>
        </div>
        <button class="btn secondary" id="closeProfileBtn">关闭</button>
      </div>
      <img id="profileAvatar" style="width: 100%; max-height: 220px; object-fit: cover; border-radius: 14px;" />
      <p id="profileBio" style="line-height: 1.6; color: #dfe7f7;"></p>
      <div class="actions-row">
        <input class="field" id="commentAuthor" placeholder="你的名字" />
      </div>
      <textarea class="textarea" id="commentText" rows="3" placeholder="写下你的留言..."></textarea>
      <div class="actions-row">
        <button class="btn" id="sendCommentBtn">发表留言</button>
      </div>
      <div class="comment-list" id="commentList"></div>
    </div>
  </div>

  <div class="overlay" id="createOverlay">
    <div class="modal">
      <div class="modal-head">
        <h2 style="margin: 0;">创建成员</h2>
        <button class="btn secondary" id="closeCreateBtn">取消</button>
      </div>
      <input class="field" id="createName" placeholder="姓名" />
      <input class="field" id="createRole" placeholder="职位" />
      <input class="field" id="createAvatarUrl" placeholder="头像地址，例如 images/team1234.png" />
      <input class="field" id="createAvatarFile" type="file" accept="image/png,image/jpeg,image/jpg" />
      <textarea class="textarea" id="createBio" rows="4" placeholder="简介"></textarea>
      <div class="actions-row">
        <button class="btn" id="saveMemberBtn">保存</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_MEMBERS = 'site_members';
    const STORAGE_COMMENTS = 'site_comments';
    let members = [];
    let comments = [];
    let selectedMemberId = null;

    function loadState() {
      try {
        members = JSON.parse(localStorage.getItem(STORAGE_MEMBERS)) || [];
        comments = JSON.parse(localStorage.getItem(STORAGE_COMMENTS)) || [];
      } catch (e) {
        members = [];
        comments = [];
      }
      if (!members.length) {
        members = [
          { id: 'member-1', name: '阿星', role: '前端设计师', bio: '擅长把复杂想法变成简洁体验。', avatar: 'images/team1234.png', hidden: false },
          { id: 'member-2', name: '小雨', role: '产品经理', bio: '喜欢把业务目标和用户体验融合。', avatar: 'images/team2.jpg', hidden: false },
          { id: 'member-3', name: '诺诺', role: '视觉策划', bio: '热爱颜色、排版与沉浸式内容。', avatar: 'images/team3.jpg', hidden: false },
          { id: 'member-4', name: '晨曦', role: '运营专家', bio: '把内容节奏和用户关系打磨得更顺。', avatar: 'images/team4.jpg', hidden: false }
        ];
        comments = [];
        saveState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_MEMBERS, JSON.stringify(members));
      localStorage.setItem(STORAGE_COMMENTS, JSON.stringify(comments));
    }

    function getAvatar(member) {
      if (member.avatar) return member.avatar;
      return 'https://api.dicebear.com/6.x/fun-emoji/svg?seed=' + encodeURIComponent(member.name || 'member');
    }

    function getFilteredMembers() {
      const key = document.getElementById('memberSearch').value.trim().toLowerCase();
      const list = members.filter(item => !item.hidden);
      if (!key) return list;
      return list.filter(member => `${member.name}${member.role}${member.bio}`.toLowerCase().includes(key));
    }

    function renderMembers() {
      const box = document.getElementById('membersGrid');
      const list = getFilteredMembers();
      if (!list.length) {
        box.innerHTML = '<div class="empty">暂无可显示成员</div>';
        return;
      }
      box.innerHTML = '';
      list.forEach(member => {
        const card = document.createElement('div');
        card.className = 'member-card';
        card.innerHTML = `<img class="avatar" src="${getAvatar(member)}" alt="${member.name}" /><h3>${member.name}</h3><p>${member.role || '成员'}</p>`;
        card.addEventListener('click', () => openProfile(member.id));
        box.appendChild(card);
      });
    }

    function openProfile(memberId) {
      const member = members.find(item => item.id === memberId);
      if (!member) return;
      selectedMemberId = memberId;
      document.getElementById('profileName').textContent = member.name;
      document.getElementById('profileRole').textContent = member.role || '成员';
      document.getElementById('profileBio').textContent = member.bio || '暂无简介';
      document.getElementById('profileAvatar').src = getAvatar(member);
      renderComments();
      document.getElementById('profileOverlay').classList.add('show');
    }

    function closeProfile() {
      selectedMemberId = null;
      document.getElementById('profileOverlay').classList.remove('show');
    }

    function renderComments() {
      const box = document.getElementById('commentList');
      if (!selectedMemberId) {
        box.innerHTML = '';
        return;
      }
      const list = comments.filter(item => item.memberId === selectedMemberId);
      if (!list.length) {
        box.innerHTML = '<div class="comment-item">还没有留言，来抢个沙发吧。</div>';
        return;
      }
      box.innerHTML = '';
      list.slice().reverse().forEach(comment => {
        const item = document.createElement('div');
        item.className = 'comment-item';
        item.innerHTML = `<div class="comment-author">${comment.author}</div><div>${comment.text}</div><div class="comment-time">${new Date(comment.createdAt).toLocaleString()}</div>`;
        box.appendChild(item);
      });
    }

    function openCreateOverlay() {
      document.getElementById('createName').value = '';
      document.getElementById('createRole').value = '';
      document.getElementById('createAvatarUrl').value = '';
      document.getElementById('createAvatarFile').value = '';
      document.getElementById('createBio').value = '';
      document.getElementById('createOverlay').classList.add('show');
    }

    function closeCreateOverlay() {
      document.getElementById('createOverlay').classList.remove('show');
    }

    function readImageFile(file) {
      return new Promise((resolve) => {
        if (!file) {
          resolve('');
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result || '');
        reader.readAsDataURL(file);
      });
    }

    async function saveNewMember() {
      const name = document.getElementById('createName').value.trim();
      if (!name) {
        alert('请输入姓名');
        return;
      }
      const file = document.getElementById('createAvatarFile').files[0];
      const avatarUrl = document.getElementById('createAvatarUrl').value.trim();
      const avatar = file ? await readImageFile(file) : avatarUrl;
      members.unshift({ id: 'member-' + Date.now(), name, role: document.getElementById('createRole').value.trim(), bio: document.getElementById('createBio').value.trim(), avatar: avatar || 'https://api.dicebear.com/6.x/fun-emoji/svg?seed=' + encodeURIComponent(name), hidden: false });
      saveState();
      renderMembers();
      closeCreateOverlay();
    }

    document.getElementById('createBtn').addEventListener('click', openCreateOverlay);
    document.getElementById('closeCreateBtn').addEventListener('click', closeCreateOverlay);
    document.getElementById('saveMemberBtn').addEventListener('click', saveNewMember);
    document.getElementById('closeProfileBtn').addEventListener('click', closeProfile);
    document.getElementById('memberSearch').addEventListener('input', renderMembers);

    document.getElementById('sendCommentBtn').addEventListener('click', () => {
      if (!selectedMemberId) return;
      const author = document.getElementById('commentAuthor').value.trim() || '匿名';
      const text = document.getElementById('commentText').value.trim();
      if (!text) {
        alert('请输入留言内容');
        return;
      }
      comments.push({ id: 'comment-' + Date.now(), memberId: selectedMemberId, author, text, createdAt: Date.now() });
      saveState();
      document.getElementById('commentText').value = '';
      renderComments();
    });

    document.getElementById('profileOverlay').addEventListener('click', (event) => {
      if (event.target === document.getElementById('profileOverlay')) closeProfile();
    });
    document.getElementById('createOverlay').addEventListener('click', (event) => {
      if (event.target === document.getElementById('createOverlay')) closeCreateOverlay();
    });

    loadState();
    renderMembers();
  </script>
</body>
</html>
