<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员后台</title>
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #0b1023, #172341); color: #f6f7fb; }
    .page { max-width: 1100px; margin: 0 auto; }
    .card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; padding: 16px; margin-bottom: 16px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; }
    .btn { border: none; border-radius: 999px; padding: 8px 12px; background: linear-gradient(135deg, #5ec8ff, #7d95ff); color: #05111d; font-weight: 700; cursor: pointer; }
    .field { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); color: white; margin-top: 8px; }
    .row { padding: 10px 12px; border-radius: 12px; background: rgba(255,255,255,0.06); margin-top: 8px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .small { color: #8fb3ff; font-size: 13px; }
    .hidden { display: none !important; }
    .overlay { position: fixed; inset: 0; background: rgba(2,6,18,0.82); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 100; }
    .overlay.show { display: flex; }
    .modal { width: min(620px, 100%); background: #10172c; padding: 18px; border-radius: 20px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
    .toolbar input { flex: 1; min-width: 220px; }
    .expandable { max-height: 240px; overflow-y: auto; padding-right: 4px; }
    .expandable::-webkit-scrollbar { width: 6px; }
    .expandable::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 999px; }
    @media (max-width: 760px) { .topbar { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1 style="margin: 0;">管理员后台</h1>
        <div class="small">默认账号：你猜猜 / 密码：你猜猜</div>
      </div>
      <div class="actions">
        <a class="btn" href="index.html" style="text-decoration: none; display: inline-block;">返回首页</a>
        <button class="btn" id="logoutBtn" class="hidden">退出登录</button>
      </div>
    </div>

    <div id="loginPanel" class="card">
      <h2>管理员登录</h2>
      <input class="field" id="adminUser" placeholder="账号" />
      <input class="field" id="adminPass" type="password" placeholder="密码" />
      <button class="btn" id="loginBtn" style="margin-top: 8px;">登录</button>
    </div>

    <div id="adminPanel" class="hidden">
      <div class="card">
        <div class="toolbar">
          <input class="field" id="memberSearch" placeholder="搜索成员姓名、职位、简介" />
          <button class="btn" id="addMemberBtn">创建成员</button>
        </div>
        <div class="expandable" id="membersList"></div>
      </div>
      <div class="card">
        <div class="toolbar">
          <input class="field" id="commentSearch" placeholder="搜索评论内容或作者" />
        </div>
        <div class="expandable" id="commentsList"></div>
      </div>
    </div>
  </div>

  <div class="overlay" id="editOverlay">
    <div class="modal">
      <h2 id="editTitle">编辑成员</h2>
      <input class="field" id="editName" placeholder="姓名" />
      <input class="field" id="editRole" placeholder="职位" />
      <input class="field" id="editAvatarUrl" placeholder="头像地址，例如 images/team1234.png" />
      <input class="field" id="editAvatarFile" type="file" accept="image/png,image/jpeg,image/jpg" />
      <textarea class="field" id="editBio" rows="4" placeholder="简介"></textarea>
      <div class="actions">
        <button class="btn" id="saveEditBtn">保存</button>
        <button class="btn" id="cancelEditBtn">取消</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="createAdminOverlay">
    <div class="modal">
      <h2>创建成员</h2>
      <input class="field" id="createAdminName" placeholder="姓名" />
      <input class="field" id="createAdminRole" placeholder="职位" />
      <input class="field" id="createAdminAvatarUrl" placeholder="头像地址，例如 images/team1234.png" />
      <input class="field" id="createAdminAvatarFile" type="file" accept="image/png,image/jpeg,image/jpg" />
      <textarea class="field" id="createAdminBio" rows="4" placeholder="简介"></textarea>
      <div class="actions">
        <button class="btn" id="saveAdminCreateBtn">保存</button>
        <button class="btn" id="cancelAdminCreateBtn">取消</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_MEMBERS = 'site_members';
    const STORAGE_COMMENTS = 'site_comments';
    let members = [];
    let comments = [];
    let editingId = null;

    function loadState() {
      try {
        members = JSON.parse(localStorage.getItem(STORAGE_MEMBERS)) || [];
        comments = JSON.parse(localStorage.getItem(STORAGE_COMMENTS)) || [];
      } catch (e) {
        members = [];
        comments = [];
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_MEMBERS, JSON.stringify(members));
      localStorage.setItem(STORAGE_COMMENTS, JSON.stringify(comments));
    }

    function isLoggedIn() {
      return sessionStorage.getItem('admin_login') === 'true';
    }

    function renderAuth() {
      document.getElementById('loginPanel').classList.toggle('hidden', isLoggedIn());
      document.getElementById('adminPanel').classList.toggle('hidden', !isLoggedIn());
      document.getElementById('logoutBtn').classList.toggle('hidden', !isLoggedIn());
    }

    function getFilteredMembers() {
      const key = document.getElementById('memberSearch').value.trim().toLowerCase();
      if (!key) return members;
      return members.filter(member => `${member.name}${member.role}${member.bio}`.toLowerCase().includes(key));
    }

    function getFilteredComments() {
      const key = document.getElementById('commentSearch').value.trim().toLowerCase();
      if (!key) return comments;
      return comments.filter(comment => `${comment.author}${comment.text}`.toLowerCase().includes(key));
    }

    function renderMembers() {
      const box = document.getElementById('membersList');
      const list = getFilteredMembers();
      if (!list.length) {
        box.innerHTML = '<div class="row">暂无成员</div>';
        return;
      }
      box.innerHTML = '';
      list.forEach(member => {
        const count = comments.filter(item => item.memberId === member.id).length;
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `<strong>${member.name}</strong><div class="small">${member.role || '成员'}</div><div>${member.bio || '暂无简介'}</div><div class="small">状态：${member.hidden ? '已隐藏' : '已显示'} · 评论数：${count}</div><div class="actions"><button class="btn" data-action="toggle-hide" data-id="${member.id}">${member.hidden ? '显示' : '隐藏'}</button><button class="btn" data-action="edit" data-id="${member.id}">编辑</button><button class="btn" data-action="delete-member" data-id="${member.id}">删除</button></div>`;
        box.appendChild(row);
      });
    }

    function renderComments() {
      const box = document.getElementById('commentsList');
      const list = getFilteredComments();
      if (!list.length) {
        box.innerHTML = '<div class="row">暂无评论</div>';
        return;
      }
      box.innerHTML = '';
      list.forEach(comment => {
        const member = members.find(item => item.id === comment.memberId);
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `<strong>${comment.author}</strong><div class="small">${member ? member.name : '已删除成员'}</div><div>${comment.text}</div><div class="small">${new Date(comment.createdAt).toLocaleString()}</div><div class="actions"><button class="btn" data-action="delete-comment" data-id="${comment.id}">删除</button></div>`;
        box.appendChild(row);
      });
    }

    function openEdit(memberId) {
      const member = members.find(item => item.id === memberId);
      if (!member) return;
      editingId = memberId;
      document.getElementById('editTitle').textContent = `编辑 ${member.name}`;
      document.getElementById('editName').value = member.name;
      document.getElementById('editRole').value = member.role || '';
      document.getElementById('editAvatarUrl').value = member.avatar || '';
      document.getElementById('editAvatarFile').value = '';
      document.getElementById('editBio').value = member.bio || '';
      document.getElementById('editOverlay').classList.add('show');
    }

    function closeEdit() {
      editingId = null;
      document.getElementById('editOverlay').classList.remove('show');
    }

    function openCreateAdminOverlay() {
      document.getElementById('createAdminName').value = '';
      document.getElementById('createAdminRole').value = '';
      document.getElementById('createAdminAvatarUrl').value = '';
      document.getElementById('createAdminAvatarFile').value = '';
      document.getElementById('createAdminBio').value = '';
      document.getElementById('createAdminOverlay').classList.add('show');
    }

    function closeCreateAdminOverlay() {
      document.getElementById('createAdminOverlay').classList.remove('show');
    }

    function readImageFile(file) {
      return new Promise((resolve) => {
        if (!file) {
          resolve('');
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result || '');
        reader.readAsDataURL(file);
      });
    }

    async function saveEdit() {
      if (!editingId) return;
      const member = members.find(item => item.id === editingId);
      if (!member) return;
      const file = document.getElementById('editAvatarFile').files[0];
      const avatarUrl = document.getElementById('editAvatarUrl').value.trim();
      const avatar = file ? await readImageFile(file) : avatarUrl;
      member.name = document.getElementById('editName').value.trim() || member.name;
      member.role = document.getElementById('editRole').value.trim();
      member.bio = document.getElementById('editBio').value.trim();
      if (avatar) member.avatar = avatar;
      saveState();
      renderMembers();
      renderComments();
      closeEdit();
    }

    async function saveAdminCreate() {
      const name = document.getElementById('createAdminName').value.trim();
      if (!name) {
        alert('请输入姓名');
        return;
      }
      const file = document.getElementById('createAdminAvatarFile').files[0];
      const avatarUrl = document.getElementById('createAdminAvatarUrl').value.trim();
      const avatar = file ? await readImageFile(file) : avatarUrl;
      members.unshift({ id: 'member-' + Date.now(), name, role: document.getElementById('createAdminRole').value.trim(), bio: document.getElementById('createAdminBio').value.trim(), avatar: avatar || 'https://api.dicebear.com/6.x/fun-emoji/svg?seed=' + encodeURIComponent(name), hidden: false });
      saveState();
      renderMembers();
      renderComments();
      closeCreateAdminOverlay();
    }

    function toggleHide(memberId) {
      const member = members.find(item => item.id === memberId);
      if (!member) return;
      member.hidden = !member.hidden;
      saveState();
      renderMembers();
    }

    function deleteMember(memberId) {
      members = members.filter(item => item.id !== memberId);
      comments = comments.filter(item => item.memberId !== memberId);
      saveState();
      renderMembers();
      renderComments();
    }

    function deleteComment(commentId) {
      comments = comments.filter(item => item.id !== commentId);
      saveState();
      renderComments();
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
      if (document.getElementById('adminUser').value === 'cnm' && document.getElementById('adminPass').value === '777888') {
        sessionStorage.setItem('admin_login', 'true');
        renderAuth();
        loadState();
        renderMembers();
        renderComments();
      } else {
        alert('账号或密码错误');
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('admin_login');
      renderAuth();
    });

    document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
    document.getElementById('cancelEditBtn').addEventListener('click', closeEdit);
    document.getElementById('editOverlay').addEventListener('click', (event) => {
      if (event.target === document.getElementById('editOverlay')) closeEdit();
    });

    document.getElementById('addMemberBtn').addEventListener('click', openCreateAdminOverlay);
    document.getElementById('saveAdminCreateBtn').addEventListener('click', saveAdminCreate);
    document.getElementById('cancelAdminCreateBtn').addEventListener('click', closeCreateAdminOverlay);
    document.getElementById('createAdminOverlay').addEventListener('click', (event) => {
      if (event.target === document.getElementById('createAdminOverlay')) closeCreateAdminOverlay();
    });

    document.getElementById('memberSearch').addEventListener('input', renderMembers);
    document.getElementById('commentSearch').addEventListener('input', renderComments);

    document.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      const action = button.getAttribute('data-action');
      const id = button.getAttribute('data-id');
      if (action === 'toggle-hide') toggleHide(id);
      if (action === 'edit') openEdit(id);
      if (action === 'delete-member') deleteMember(id);
      if (action === 'delete-comment') deleteComment(id);
    });

    loadState();
    renderAuth();
    if (isLoggedIn()) {
      renderMembers();
      renderComments();
    }
  </script>
</body>
</html>
